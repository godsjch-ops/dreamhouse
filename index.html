var today = new Date();
var currentMonth = today.getMonth() + 1;
var selectedMonth = currentMonth;

function getPhase(m) {
  for (var i=0;i<PHASES.length;i++) if (PHASES[i].months.indexOf(m)!==-1) return PHASES[i];
  return null;
}

function taskHtml(t, dotCls, isUpcoming) {
  var subCls = (!isUpcoming && t.urgent) ? ' urgent' : '';
  var textStyle = isUpcoming ? 'font-size:12px;color:#555;' : '';
  if (t.key && TASK_DETAILS[t.key]) {
    return '<li><div class="task-item task-detail-btn" onclick="openPanel(\'' + t.key + '\')">' +
      '<div class="task-dot ' + dotCls + '"></div>' +
      '<div class="task-body"><div class="task-text" style="' + textStyle + '">' + t.text + '</div>' +
      '<div class="task-sub' + subCls + '">' + t.sub + '</div></div>' +
      '<div class="detail-arrow">›</div></div></li>';
  }
  if (t.url) {
    return '<li><a href="' + t.url + '" target="_blank" class="task-link">' +
      '<div class="task-dot ' + dotCls + '"></div>' +
      '<div class="task-body"><div class="task-text" style="' + textStyle + '">' + t.text + '</div>' +
      '<div class="task-sub' + subCls + '">' + t.sub + '</div></div>' +
      '<div class="task-arrow">↗</div></a></li>';
  }
  return '<li class="task-item"><div class="task-dot ' + dotCls + '"></div>' +
    '<div class="task-body"><div class="task-text" style="' + textStyle + '">' + t.text + '</div>' +
    '<div class="task-sub' + subCls + '">' + t.sub + '</div></div></li>';
}

function render(viewMonth) {
  var phase = getPhase(viewMonth);
  var isPast = viewMonth < currentMonth;
  var isNow = viewMonth === currentMonth;

  // Badge
  var badgeEl = document.getElementById('phaseBadge');
  if (phase) {
    var bc = isNow ? 'badge-now' : isPast ? 'badge-past' : 'badge-upcoming';
    var dot = isNow ? '<div class="phase-dot"></div>' : '';
    var sfx = isNow ? ' 진행 중' : isPast ? ' (완료)' : ' (예정)';
    var hint = (!isNow) ? '<div class="view-hint">📅 ' + viewMonth + '월 기준으로 보는 중 — <a href="#" onclick="resetToToday();return false;" style="color:#378ADD;text-decoration:none;">오늘로 돌아가기</a></div>' : '';
    badgeEl.innerHTML = '<div class="phase-badge ' + bc + '">' + dot + viewMonth + '월 · ' + phase.label + sfx + '</div>' + hint;
  }

  // Done
  document.getElementById('doneLabel').textContent = isPast ? (viewMonth + '월 이전 완료 항목') : '완료되어 있어야 할 것';
  var dEl = document.getElementById('doneList');
  if (phase && phase.doneTasks.length > 0) {
    var h = '';
    phase.doneTasks.forEach(function(t){ h += taskHtml(t, 'dot-done', false); });
    dEl.innerHTML = h;
  } else {
    dEl.innerHTML = '<li style="padding:8px 0;font-size:13px;color:#888780;">사업 시작 단계입니다</li>';
  }

  // Now
  document.getElementById('nowLabel').textContent = isPast ? (viewMonth + '월 주요 업무') : isNow ? '지금 해야 할 일' : (viewMonth + '월 예정 업무');
  var nEl = document.getElementById('nowList');
  if (phase) {
    var dotCls = isPast ? 'dot-done' : isNow ? 'dot-now' : 'dot-upcoming';
    var nh = '';
    phase.nowTasks.forEach(function(t){ nh += taskHtml(t, dotCls, false); });
    if (!isPast && phase.upcomingTasks && phase.upcomingTasks.length > 0) {
      nh += '<li><span class="divider-label">다음 단계 예고</span></li>';
      phase.upcomingTasks.forEach(function(t){ nh += taskHtml(t, 'dot-upcoming', true); });
    }
    nEl.innerHTML = nh;
  }

  // Notion + GitHub links
  var lh = '';
  NOTION_PAGES.forEach(function(p){
    var active = phase && phase.notionPageId === p.id;
    lh += '<div class="notion-link-row' + (active?' active':'') + '">' +
      '<div class="notion-link-title"><span>📋</span><span>' + p.label + '</span>' +
      (active ? '<span class="current-tag">관련</span>' : '') + '</div>' +
      '<a href="https://notion.so/' + p.id + '" target="_blank" class="link-btn btn-notion">노션 ↗</a>' +
      '<a href="' + GH + p.gh + '" target="_blank" class="link-btn btn-github">MD ↗</a>' +
      '</div>';
  });
  document.getElementById('notionLinks').innerHTML = lh;
}

function renderMonthGrid() {
  var h = '';
  for (var m=0;m<12;m++) {
    var n = m+1;
    var cls = n===currentMonth ? 'm-now' : n<currentMonth ? 'm-done' : 'm-upcoming';
    var sel = n===selectedMonth ? ' m-selected' : '';
    h += '<div class="month-box '+cls+sel+'" onclick="selectMonth('+n+')" title="'+n+'월 업무 보기"><span class="month-name">'+MONTHS[m]+'</span><div class="month-dot"></div></div>';
  }
  document.getElementById('monthGrid').innerHTML = h;
}

function selectMonth(m) {
  selectedMonth = m;
  renderMonthGrid();
  render(m);
}

function resetToToday() { selectMonth(currentMonth); }

function openPanel(key) {
  var d = TASK_DETAILS[key];
  if (!d) return;
  var html = '';
  html += '<div class="panel-summary">' + d.summary + '</div>';
  (d.sections || []).forEach(function(sec) {
    html += '<div class="panel-section">';
    html += '<div class="panel-section-title">' + sec.title + '</div>';
    if (sec.type === 'steps') {
      html += '<ol class="panel-steps">';
      sec.items.forEach(function(item){ html += '<li>' + item + '</li>'; });
      html += '</ol>';
    } else if (sec.type === 'checklist') {
      html += '<ul class="panel-checks">';
      sec.items.forEach(function(item){ html += '<li>' + item + '</li>'; });
      html += '</ul>';
    } else if (sec.type === 'info') {
      html += '<ul class="panel-info">';
      sec.items.forEach(function(item){ html += '<li>' + item + '</li>'; });
      html += '</ul>';
    } else if (sec.type === 'warning') {
      html += '<ul class="panel-warns">';
      sec.items.forEach(function(item){ html += '<li>' + item + '</li>'; });
      html += '</ul>';
    } else if (sec.type === 'table') {
      html += '<table class="panel-table"><thead><tr>';
      sec.headers.forEach(function(h){ html += '<th>' + h + '</th>'; });
      html += '</tr></thead><tbody>';
      sec.rows.forEach(function(row){ html += '<tr>'; row.forEach(function(c){ html += '<td>' + c + '</td>'; }); html += '</tr>'; });
      html += '</tbody></table>';
    }
    html += '</div>';
  });
  var panel = document.getElementById('detailPanel');
  panel.querySelector('.panel-title').textContent = d.title;
  panel.querySelector('.panel-month').textContent = d.month;
  panel.querySelector('.panel-body').innerHTML = html;
  var footer = panel.querySelector('.panel-footer');
  footer.innerHTML = d.notionUrl ? '<a href="' + d.notionUrl + '" target="_blank" class="panel-footer pf-notion">📋 노션에서 보기 ↗</a>' : '';
  document.getElementById('panelOverlay').classList.add('open');
  panel.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
  document.getElementById('panelOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function init() {
  today = new Date();
  currentMonth = today.getMonth() + 1;
  selectedMonth = currentMonth;

  document.getElementById('dateDisplay').textContent =
    today.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'}) + ' 기준 자동 계산';

  var cp = getPhase(currentMonth);
  var cIdx = -1;
  for (var i=0;i<PHASES.length;i++) if (PHASES[i].months.indexOf(currentMonth)!==-1){cIdx=i;break;}

  document.getElementById('statGrid').innerHTML =
    '<div class="stat-card"><div class="stat-num">'+(cIdx>=0?cIdx:0)+'</div><div class="stat-lbl">완료된 단계</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:#1D9E75;">'+(cp?1:0)+'</div><div class="stat-lbl">현재 진행 중</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:#378ADD;">'+(cIdx>=0?PHASES.length-cIdx-1:PHASES.length)+'</div><div class="stat-lbl">남은 단계</div></div>';

  var pct = Math.round(((currentMonth-1)/11)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = '연간 진행률 '+pct+'%';

  renderMonthGrid();
  render(currentMonth);
}

init();
</script>

<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="panel-header">
    <div>
      <div class="panel-title" id="panelTitle"></div>
      <div class="panel-month" id="panelMonth"></div>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
  <div class="panel-footer" id="panelFooter"></div>
</div>
</body>
</html>
